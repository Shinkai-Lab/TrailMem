<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TrailMem 記憶網ビュワー</title>
<!--
  TrailMem 記憶網ビュワー (自己完結HTML / file://で直接開けます)

  ★重要: このHTMLはグラフ描画に 3d-force-graph (unpkg CDN) を読み込みます。
         オフライン環境ではグラフ本体(3D球体+線)は表示されません。
         統計ヘッダとサイドパネル用のデータ自体はこのファイル内に完全に
         埋め込まれているので、CDNが読めなくても壊れているわけではありません。
  CDN: https://unpkg.com/3d-force-graph@1.80.0/dist/3d-force-graph.min.js
-->
<style>
:root {
  --bg: #05070a;
  --panel-bg: #0d1219;
  --card: #131920;
  --border: #1e2a35;
  --accent: #63d6ff;
  --warn: #ff7676;
  --ok: #7deb9a;
  --watch: #ffc85c;
  --gold: #ffd54f;
  --purple: #c88cff;
  --text: #e0dcd6;
  --dim: #8b9bb0;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: var(--bg); color: var(--text); font: 13px/1.5 'Inter', system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif; overflow: hidden; width: 100%; height: 100%; }

#graph { position: fixed; inset: 0; z-index: 0; }

#label-layer { position: fixed; inset: 0; z-index: 5; pointer-events: none; overflow: hidden; }
.hub-label {
  position: absolute; left: 0; top: 0;
  transform: translate(-50%, -160%);
  color: #cfe9ff; font-size: 11px; font-weight: 600;
  text-shadow: 0 0 4px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.7);
  white-space: nowrap; pointer-events: none; letter-spacing: 0.02em;
}

#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  background: linear-gradient(180deg, rgba(5,7,10,0.96) 0%, rgba(5,7,10,0.85) 70%, rgba(5,7,10,0) 100%);
  padding: 12px 16px 24px;
  display: flex; flex-wrap: wrap; align-items: center; gap: 14px;
  pointer-events: none;
}
#header * { pointer-events: auto; }
#title { font-size: 1.05em; font-weight: 700; color: var(--accent); letter-spacing: 0.02em; white-space: nowrap; }
#title small { display: block; font-size: 0.65em; font-weight: 400; color: var(--dim); }

.stat-chip {
  background: rgba(19,25,32,0.85); border: 1px solid var(--border); border-radius: 8px;
  padding: 5px 10px; text-align: center; min-width: 58px;
}
.stat-chip .num { font-size: 1.05em; font-weight: 700; color: var(--accent); line-height: 1.1; }
.stat-chip .label { font-size: 0.68em; color: var(--dim); white-space: nowrap; }
.stat-chip.gold .num { color: var(--gold); }

#band-bar { display: flex; height: 18px; width: 220px; border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
#band-bar div { height: 100%; }
#band-bar .b-recall { background: var(--ok); }
#band-bar .b-deep { background: var(--accent); }
#band-bar .b-dig { background: var(--watch); }
#band-legend { font-size: 0.68em; color: var(--dim); display: flex; gap: 8px; margin-top: 3px; }
#band-legend span.sw { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 3px; vertical-align: -1px; }

#search-wrap { position: relative; margin-left: auto; }
#search-box {
  background: rgba(13,18,25,0.9); border: 1px solid var(--border); color: var(--text);
  border-radius: 8px; padding: 7px 12px; font-size: 0.9em; width: 220px; outline: none;
}
#search-box:focus { border-color: var(--accent); }
#search-result { font-size: 0.7em; color: var(--dim); margin-top: 3px; }

#legend-wrap { display: flex; gap: 10px; align-items: center; font-size: 0.7em; color: var(--dim); }
#legend-wrap .sw { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: -1px; }
#legend-title { cursor: pointer; user-select: none; font-weight: 600; }
#legend-wrap.collapsed .legend-item { display: none; }

#label-toggle { display: flex; align-items: center; gap: 5px; font-size: 0.72em; color: var(--dim); white-space: nowrap; }

#lang-toggle {
  position: fixed; top: 10px; right: 16px; z-index: 15;
  display: flex; gap: 2px; background: rgba(13,18,25,0.85); border: 1px solid var(--border);
  border-radius: 8px; padding: 3px;
}
#lang-toggle button {
  background: none; border: none; color: var(--dim); font-size: 0.72em; font-weight: 700;
  padding: 4px 10px; border-radius: 6px; cursor: pointer;
}
#lang-toggle button.active { background: var(--accent); color: #05070a; }

#side-panel {
  position: fixed; top: 0; right: -420px; width: 400px; height: 100%;
  background: var(--panel-bg); border-left: 1px solid var(--border);
  z-index: 20; transition: right 0.25s ease; overflow-y: auto;
  box-shadow: -12px 0 40px rgba(0,0,0,0.5);
}
#side-panel.open { right: 0; }
#panel-inner { padding: 20px 18px 40px; }
#panel-close {
  position: absolute; top: 12px; right: 14px; background: none; border: none;
  color: var(--dim); font-size: 1.3em; cursor: pointer; line-height: 1;
}
#panel-close:hover { color: var(--text); }
#panel-title { font-size: 1.25em; font-weight: 700; color: var(--text); margin-bottom: 2px; word-break: break-word; padding-right: 24px; }
#panel-badges { display: flex; gap: 6px; margin: 8px 0 4px; flex-wrap: wrap; }
.badge { font-size: 0.7em; padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); color: var(--dim); }
.badge.gold { color: var(--gold); border-color: var(--gold); }
.badge.purple { color: var(--purple); border-color: var(--purple); }
.badge.blue { color: var(--accent); border-color: var(--accent); }
#panel-hint {
  margin: 12px 0 16px; padding: 8px 10px; background: rgba(255,255,255,0.04);
  border-left: 3px solid var(--watch); border-radius: 4px; font-size: 0.75em; color: var(--dim);
}
#panel-hint code { color: var(--watch); font-family: monospace; word-break: break-all; }
#panel-episodes-title { font-size: 0.8em; color: var(--dim); margin: 14px 0 8px; text-transform: uppercase; letter-spacing: 0.05em; }
.ep-row { border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; margin-bottom: 8px; background: rgba(255,255,255,0.02); }
.ep-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
.ep-strength { font-family: monospace; color: var(--accent); font-weight: 700; }
.ep-r { font-size: 0.75em; color: var(--dim); }
.ep-date { font-size: 0.75em; color: var(--dim); margin-left: auto; }
.ep-hof { font-size: 0.95em; }
.ep-summary { font-size: 0.85em; color: var(--text); line-height: 1.5; word-break: break-word; }
.ep-id { font-size: 0.65em; color: var(--dim); margin-top: 4px; word-break: break-all; opacity: 0.6; }
.empty-note { color: var(--dim); font-size: 0.85em; padding: 10px 0; }

#footer-hint {
  position: fixed; bottom: 10px; left: 16px; z-index: 10; font-size: 0.68em; color: var(--dim);
  background: rgba(13,18,25,0.7); padding: 4px 8px; border-radius: 6px; pointer-events: none;
}

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div id="graph"></div>
<div id="label-layer"></div>

<div id="header">
  <div id="title"><span id="title-text">TrailMem 記憶網ビュワー</span><small id="db-file-note">-</small></div>

  <div class="stat-chip"><div class="num" id="stat-episodes">-</div><div class="label">episodes</div></div>
  <div class="stat-chip"><div class="num" id="stat-keywords">-</div><div class="label">keywords</div></div>
  <div class="stat-chip"><div class="num" id="stat-links">-</div><div class="label">links</div></div>
  <div class="stat-chip"><div class="num" id="stat-edges">-</div><div class="label">edges</div></div>
  <div class="stat-chip gold"><div class="num" id="stat-hof">-</div><div class="label" id="stat-hof-label">殿堂入り</div></div>

  <div>
    <div id="band-bar">
      <div class="b-recall" id="band-recall"></div>
      <div class="b-deep" id="band-deep"></div>
      <div class="b-dig" id="band-dig"></div>
    </div>
    <div id="band-legend">
      <span><span class="sw" style="background:var(--ok)"></span>recall</span>
      <span><span class="sw" style="background:var(--accent)"></span>deep</span>
      <span><span class="sw" style="background:var(--watch)"></span>dig</span>
    </div>
  </div>

  <div id="legend-wrap">
    <span id="legend-title" onclick="document.getElementById('legend-wrap').classList.toggle('collapsed')">凡例</span>
    <span class="legend-item"><span class="sw" style="background:var(--gold)"></span><span id="legend-hof-text">殿堂入りリンク保持</span></span>
    <span class="legend-item" id="legend-purple"><span class="sw" style="background:var(--purple)"></span><span id="legend-theme-text">axis:theme</span></span>
    <span class="legend-item"><span class="sw" style="background:var(--accent)"></span><span id="legend-normal-text">通常</span></span>
  </div>

  <label id="label-toggle"><input type="checkbox" id="hub-label-checkbox" checked> <span id="hub-label-text">ハブラベル常時表示</span></label>

  <div id="search-wrap">
    <input id="search-box" type="text" placeholder="キーワードで検索…" autocomplete="off">
    <div id="search-result"></div>
  </div>
</div>

<div id="lang-toggle">
  <button type="button" id="lang-btn-ja" data-lang="ja">JA</button>
  <button type="button" id="lang-btn-en" data-lang="en">EN</button>
</div>

<div id="footer-hint"><span id="footer-hint-text">ドラッグ=回転 / スクロール=ズーム / クリック=詳細 / 背景クリック=閉じる</span></div>

<div id="side-panel">
  <div id="panel-inner">
    <button id="panel-close" title="閉じる">×</button>
    <div id="panel-title">-</div>
    <div id="panel-badges"></div>
    <div id="panel-hint">
      <span id="panel-hint-text">強度の手動調整は:</span><br>
      <code>bash trailmem-doctor.sh set-strength &lt;episode_id&gt; &lt;keyword&gt; &lt;value&gt;</code>
    </div>
    <div id="panel-episodes-title">紐づくエピソード (強度降順)</div>
    <div id="panel-episodes"></div>
  </div>
</div>

<script type="application/json" id="trailmem-data">{"meta":{"generatedAt":"2026-07-02T13:42:56.341103+00:00","dbFile":"kokoro_demo.db","nConsolidate":30,"minEdgeWeight":0.05,"hasAxisColumn":true,"labelAlwaysDegree":5,"counts":{"episodes":707,"keywordsNodes":73,"linksLive":2302,"edgesTotal":449,"edgesRendered":449,"edgesPruned":0},"strengthBands":{"recall":100,"deep":2202,"dig":0,"total":2302},"hallOfFameLinks":3},"nodes":[{"id":"k","label":"k","degree":146,"hof":false,"axis":"","axisTheme":false,"color":"#63d6ff","colorClass":"blue","val":146,"episodes":[{"id":"kokoro-p0555","summary":"Ｋの神経衰弱はこの時もう大分よくなっていたらしいのです。それと反比例に、私の方は段々過敏になって来ていたのです。","strength":1.0,"R":9,"date":"2026-06-17","hof":false},{"id":"kokoro-p0579","summary":"私はそれまで躊躇していた自分の心を、一思いに相手の胸へ擲き付けようかと考え出しました。私の相手というのはお嬢さんではありません、奥さんの事です。","strength":0.887,"R":7,"date":"2026-06-17","hof":false},{"id":"kokoro-p0692","summary":"私はただ人間の罪というものを深く感じたのです。その感じが私をＫの墓へ毎月行かせます。","strength":0.451,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0681","summary":"妻はそれを今日に困らないから心に弛みが出るのだと観察していたようでした。妻の家にも親子二人ぐらいは坐っていてどうかこうか暮して行ける財産がある上に、私も職業を求…","strength":0.429,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0683","summary":"妻の母は時々気拙い事を妻にいうようでした。それを妻は私に隠していました。","strength":0.429,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0686","summary":"同時に私はＫの死因を繰り返し繰り返し考えたのです。その当座は頭がただ恋の一字で支配されていたせいでもありましょうが、私の観察はむしろ簡単でしかも直線的でした。","strength":0.429,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0671","summary":"「Ｋの葬式の帰り路に、私はその友人の一人から、Ｋがどうして自殺したのだろうという質問を受けました。事件があって以来私はもう何度となくこの質問で苦しめられていたの…","strength":0.407,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0672","summary":"私の答えは誰に対しても同じでした。私はただ彼の私宛で書き残した手紙を繰り返すだけで、外に一口も附け加える事はしませんでした。","strength":0.407,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0675","summary":"結婚した時お嬢さんが、――もうお嬢さんではありませんから、妻といいます。――妻が、何を思い出したのか、二人でＫの墓参りをしようといい出しました。","strength":0.407,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0676","summary":"私は妻の望み通り二人連れ立って雑司ヶ ":"2026-06-17","hof":false},{"id":"kokoro-p0390","summary":"母は父のために箒で背中をどやされた時の事などを話した。今まで何遍もそれを聞かされた私と兄は、いつもとはまるで違った気分で、母の言葉を父の記念のように耳へ受け入れ…","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0395","summary":"私は看護婦を相手に、父の水枕を取り更えて、それから新しい氷を入れた氷嚢を頭の上へ載せた。がさがさに割られて尖り切った氷の破片が、嚢の中で落ちつく間、私は父の禿げ…","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0396","summary":"それは普通の手紙に比べるとよほど目方の重いものであった。並の状袋にも入れてなかった。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0397","summary":"その日は病人の出来がことに悪いように見えた。私が厠へ行こうとして席を立った時、廊下で行き合った兄は「どこへ行く」と番兵のような口調で誰何した。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0401","summary":"私の心はこの多量の紙と印気が、私に何事を語るのだろうかと思って驚いた。私は同時に病室の事が気にかかった。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0405","summary":"病室にはいつの間にか医者が来ていた。なるべく病人を楽にするという主意からまた浣腸を試みるところであった。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0411","summary":"私は停車場の壁へ紙片を宛てがって、その上から鉛筆で母と兄あてで手紙を書いた。手紙はごく簡単なものであったが、断らないで走るよりまだ増しだろうと思って、それを急い…","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0435","summary":"しかしこの自分を育て上げたと同じような匂いの中で、私はまた突然結婚問題を叔父から鼻の先へ突き付けられました。叔父のいう所は、去年の勧誘を再び繰り返したのみです。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0521","summary":"手紙にはその後Ｋがどうしているか知らせてくれと書いてありました。姉が心配しているから、なるべく早く返事を貰いたいという依頼も付け加えてありました。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0523","summary":"私はＫと同じような返事を彼の義兄宛で出しました。その中に、万一の場合には私がどうでもするから、安心するようにという意味を強い言葉で書き現わしました。","strength":0.213,"R":1,"date":"2026-06-17","hof":false}]},{"id":"先生","label":"先生","degree":234,"hof":false,"axis":"","axisTheme":false,"color":"#63d6ff","colorClass":"blue","val":234,"episodes":[{"id":"kokoro-p0077","summary":"私の仮定ははたして誤らなかった。けれども私はただ恋の半面だけを想像に描き得たに過ぎなかった。","strength":1.0,"R":24,"date":"2026-06-17","hof":false},{"id":"kokoro-p0170","summary":"「しかし人間は健康にしろ病気にしろ、どっちにしても脆いものですね。いつどんな事でどんな死にようをしないとも限らないから」「先生もそんな事を考えてお出ですか」「い…","strength":1.0,"R":13,"date":"2026-06-17","hof":false},{"id":"kokoro-p0018","summary":"私はその晩先生の宿を尋ねた。宿といっても普通の旅館と違って、広い寺の境内にある別荘のような建物であった。","strength":0.438,"R":3,"date":"2026-06-17","hof":false},{"id":"kokoro-p0043","summary":"「私は淋しい人間です」と先生がいった。「だからあなたの来て下さる事を喜んでいます。","strength":0.438,"R":3,"date":"2026-06-17","hof":false},{"id":"kokoro-p0067","summary":"私は今前後の行き掛りを忘れてしまったから、先生が何のためにこんな自白を私にして聞かせたのか、判然いう事ができない。けれども先生の態度の真面目であったのと、調子の…","strength":0.438,"R":3,"date":"2026-06-17","hof":false},{"id":"kokoro-p0082","summary":"我々は群集の中にいた。群集はいずれも嬉しそうな顔をしていた。","strength":0.438,"R":3,"date":"2026-06-17","hof":false},{"id":"kokoro-p0118","summary":"「そりゃ私から見れば分っています。（先生はそう思っていないかも知れませんが）。","strength":0.438,"R":3,"date":"2026-06-17","hof":false},{"id":"kokoro-p0139","summary":"先生はむしろ機嫌がよかった。しかし奥さんの調子はさらによかった。","strength":0.438,"R":3,"date":"2026-06-17","hof":false},{"id":"kokoro-p0011","summary":"彼らの出て行った後、私はやはり元の床几に腰をおろして烟草を吹かしていた。その時私はぽかんとしながら先生の事を考えた。","strength":0.325,"R":2,"date":"2026-06-17","hof":false},{"id":"kokoro-p0020","summary":"私はこういう事でよく先生から失望させられた。先生はそれに気が付いているようでもあり、また全く気が付かないようでもあった。","strength":0.325,"R":2,"date":"2026-06-17","hof":false},{"id":"kokoro-p0034","summary":"けれども先生の私に対する態度は初めて挨拶をした時も、懇意になったその後も、あまり変りはなかった。先生は何時も静かであった。","strength":0.325,"R":2,"date":"2026-06-17","hof":false},{"id":"kokoro-p0041","summary":"私は月に二度もしくは三度ずつ必ず先生の宅へ行くようになった。私の足が段々繁くなった時のある日、先生は突然私に向かって聞いた。","strength":0.325,"R":2,"date":"2026-06-17","hof":false},{"id":"kokoro-p0042","summary":"なるほど迷惑という様子は、先生のどこにも見えなかった。私は先生の交際の範囲の極めて狭い事を知っていた。","strength":0.325,"R":2,"date":"2026-06-17","hof":false},{"id":"kokoro-p0051","summary":"ある時私は先生の宅で酒を飲まされた。その時奥さんが出て来て傍で酌をしてくれた。","strength":0.325,"R":2,"date":"2026-06-17","hof":false},{"id":"kokoro-p0071","summary":"先生はまるで世間に名前を知られていない人であった。だから先生の学問や思想については、先生と密切の関係をもっている私より外に敬意を払うもののあるべきはずがなかった…","strength":0.325,"R":2,"date":"2026-06-17","hof":false},{"id":"kokoro-p0102","summary":"私は先生のこの人生観の基点に、或る強烈な恋愛事件を仮定してみた。（無論先生と奥さんとの間に起った）。","strength":0.325,"R":2,"date":"2026-06-17","hof":false},{"id":"kokoro-p0126","summary":"「どうぞ隠さずにいって下さい。そう思われるのは身を切られるより辛いんだから」と奥さんがまたいった。","strength":0.325,"R":2,"date":"2026-06-17","hof":false},{"id":"kokoro-p0148","summary":"先生は少し風邪の気味で、座敷へ出るのが臆劫だといって、私をその書斎に通した。書斎の硝子戸から冬に入って稀に見るような懐かしい和らかな日光が机掛けの上に射していた…","strength":0.325,"R":2,"date":"2026-06-17","hof":false},{"id":"kokoro-p0154","summary":"私は先生に手紙を書いて恩借の礼を述べた。正月上京する時に持参するからそれまで待ってくれるようにと断わった。","strength":0.325,"R":2,"date":"2026-06-17","hof":false},{"id":"kokoro-p0171","summary":"その日はそれで帰った。帰ってからも父の病気はそれほど苦にならなかった。","strength":0.325,"R":2,"date":"2026-06-17","hof":false},{"id":"kokoro-p0191","summary":"「これでも元は財産家なんですよ、君」といい直した先生は、次に私の顔を見て微笑した。私はそれでも何とも答えなかった。","strength":0.325,"R":2,"date":"2026-06-17","hof":false},{"id":"kokoro-p0407","summary":"私は今にも変がありそうな病室を退いてまた先生の手紙を読もうとした。しかし私はすこしも寛くりした気分になれなかった。","strength":0.325,"R":2,"date":"2026-06-17","hof":false},{"id":"kokoro-p0410","summary":"私はまた病室を退いて自分の部屋に帰った。そこで時計を見ながら、汽車の発着表を調べた。","strength":0.325,"R":2,"date":"2026-06-17","hof":false},{"id":"kokoro-p0001","summary":"私はその人を常に先生と呼んでいた。だからここでもただ先生と書くだけで本名は打ち明けない。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0002","summary":"私が先生と知り合いになったのは鎌倉である。その時私はまだ若々しい書生であった。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0006","summary":"私は実に先生をこの雑沓の間に見付け出したのである。その時海岸には掛茶屋が二軒あった。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0007","summary":"私がその掛茶屋で先生を見た時は、先生がちょうど着物を脱いでこれから海へ入ろうとするところであった。私はその時反対に濡れた身体を風に吹かして水から上がって来た。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0009","summary":"彼はやがて自分の傍を顧みて、そこにこごんでいる日本人に、一言二言何かいった。その日本人は砂の上に落ちた手拭を拾い上げているところであったが、それを取り上げるや否…","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0012","summary":"その時の私は屈托がないというよりむしろ無聊に苦しんでいた。それで翌日もまた先生に会った時刻を見計らって、わざわざ掛茶屋まで出かけてみた。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0013","summary":"私は次の日も同じ時刻に浜へ行っ た。私が丸い墓石だの細長い御影の碑だのを指して、しきりにかれこれいい…","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0029","summary":"墓地の区切り目に、大きな銀杏が一本空を隠すように立っていた。その下へ来た時、先生は高い梢を見上げて、「もう少しすると、綺麗ですよ。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0031","summary":"これからどこへ行くという目的のない私は、ただ先生の歩く方へ歩いて行った。先生はいつもより口数を利かなかった。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0032","summary":"先生はこれ以外に何も答えなかった。私もその話はそれぎりにして切り上げた。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0033","summary":"私はそれから時々先生を訪問するようになった。行くたびに先生は在宅であった。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0035","summary":"今いった通り先生は始終静かであった。落ち付いていた。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0036","summary":"先生と話していた私は、ふと先生がわざわざ注意してくれた銀杏の大樹を眼の前に想い浮かべた。勘定してみると、先生が毎月例として墓参に行く日が、それからちょうど三日目…","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0037","summary":"先生は何とも答えなかった。しばらくしてから、「私のは本当の墓参りだけなんだから」といって、どこまでも墓参と散歩を切り離そうとする風に見えた。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0038","summary":"実際私には墓参と散歩との区別がほとんど無意味のように思われたのである。すると先生の眉がちょっと曇った。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0039","summary":"「私は」と先生がいった。「私はあなたに話す事のできないある理由があって、他といっしょにあすこへ墓参りには行きたくないのです。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0040","summary":"私は不思議に思った。しかし私は先生を研究する気でその宅へ出入りをするのではなかった。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0044","summary":"この問答は私にとってすこぶる不得要領のものであったが、私はその時底まで押さずに帰ってしまった。しかもそれから四日と経たないうちにまた先生を訪問した。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0045","summary":"私は外の人からこういわれたらきっと癪に触ったろうと思う。しかし先生にこういわれた時は、まるで反対であった。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0046","summary":"「私は淋しい人間です」と先生はその晩またこの間の言葉を繰り返した。「私は淋しい人間ですが、ことによるとあなたも淋しい人間じゃないですか。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0047","summary":"「あなたは私に会ってもおそらくまだ淋しい気がどこかでしているでしょう。私にはあなたのためにその淋しさを根元から引き抜いて上げるだけの力がないんだから。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0048","summary":"幸いにして先生の予言は実現されずに済んだ。経験のない当時の私は、この予言の中に含まれている明白な意義さえ了解し得なかった。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0049","summary":"普通の人間として私は女に対して冷淡ではなかった。けれども年の若い私の今まで経過して来た境遇からいって、私はほとんど交際らしい交際を女に結んだ事がなかった。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0050","summary":"これは奥さんに特色がないというよりも、特色を示す機会が来なかったのだと解釈する方が正当かも知れない。しかし私はいつでも先生に付属した一部分のような心持で奥さんに…","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0052","summary":"先生の宅は夫婦と下女だけであった。行くたびに大抵はひそりとしていた。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0053","summary":"「子供でもあると好いんですがね」と奥さんは私の方を向いていった。私は「そうですな」と答えた。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0054","summary":"私の知る限り先生と奥さんとは、仲の好い夫婦の一対であった。家庭の一員として暮した事のない私のことだから、深い消息は無論解らなかったけれども、座敷で私と対坐してい…","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0055","summary":"先生は時々奥さんを伴れて、音楽会だの芝居だのに行った。それから夫婦づれで一週間以内の旅行をした事も、私の記憶によると、二、三度以上あった。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0056","summary":"当時の私の眼に映った先生と奥さんの間柄はまずこんなものであった。そのうちにたった一つの例外があった。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0057","summary":"妙に不安な心持が私を襲って来た。私は書物を読んでも呑み込む能力を失ってしまった。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0058","summary":"その晩私は先生といっしょに麦酒を飲んだ。先生は元来酒量に乏しい人であった。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0059","summary":"私の腹の中には始終先刻の事が引っ懸っていた。肴の骨が咽喉に刺さった時のように、私は苦しんだ。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0060","summary":"二人が帰るとき歩きながらの沈黙が一丁も二丁もつづいた。その後で突然先生が口を利き出した。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0061","summary":"「悪い事をした。怒って出たから妻はさぞ心配をしているだろう。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0062","summary":"「そういうと、夫の方はいかにも心丈夫のようで少し滑稽だが。君、私は君の眼にどう映りますかね。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0063","summary":"先生の宅へ帰るには私の下宿のつい傍を通るのが順路であった。私はそこまで来て、曲り角で分れるのが先生に済まないような気がした。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0064","summary":"先生が最後に付け加えた「妻君のために」という言葉は妙にその時の私の心を暖かにした。私はその言葉のために、帰ってから安心して寝る事ができた。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0065","summary":"先生と奥さんの間に起った波瀾が、大したものでない事はこれでも解った。それがまた滅多に起る現象でなかった事も、その後絶えず出入りをして来た私にはほぼ推察ができた。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0068","summary":"私はそのうち先生の留守に行って、奥さんと二人差向いで話をする機会に出合った。先生はその日横浜を出帆する汽船に乗って外国へ行くべき友人を新橋へ送りに行って留守であ…","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0069","summary":"その時の私はすでに大学生であった。始めて先生の宅へ来た頃から見るとずっと成人した気でいた。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0070","summary":"先生は大学出身であった。これは始めから私に知れていた。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0072","summary":"「悟るの悟らないのって、――そりゃ女だからわたくしには解りませんけれど、おそらくそんな意味じゃないでしょう。やっぱり何かやりたいのでしょう。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0074","summary":"奥さんの語気には非常に同情があった。それでも口元だけには微笑が見えた。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0075","summary":"奥さんは東京の人であった。それはかつて先生からも奥さん自身からも聞いて知っていた。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0076","summary":"先生と知り合いになってから先生の亡くなるまでに、私はずいぶん色々の問題で先生の思想や情操に触れてみたが、結婚当時の状況については、ほとんど何ものも聞き得なかった…","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0078","summary":"私は今この悲劇について何事も語らない。その悲劇のためにむしろ生れ出たともいえる二人の恋愛については、先刻いった通りであった。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0079","summary":"ただ一つ私の記憶に残っている事がある。或る時花時分に私は先生といっしょに上野へ行った。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0083","summary":"「なぜだか今に解ります。今にじゃない、もう解っているはずです。","strength" を付けないといけない。恋は罪悪なんだから。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0086","summary":"私は想像で知っていた。しかし事実としては知らなかった。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0087","summary":"「先生、罪悪という意味をもっと判然いって聞かして下さい。それでなければこの問題をここで切り上げて下さい。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0088","summary":"先生のこの問いは全く突然であった。しかも先生は私がこの問いに対して答えられないという事もよく承知していた。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0089","summary":"「また悪い事をいった。焦慮せるのが悪いと思って、説明しようとすると、その説明がまたあなたを焦慮せるような結果になる。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0090","summary":"年の若い私はややともすると一図になりやすかった。少なくとも先生の眼にはそう映っていたらしい。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0093","summary":"その時生垣の向うで金魚売りらしい声がした。その外には何の聞こえるものもなかった。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0094","summary":"「私は私自身さえ信用していないのです。つまり自分で自分が信用できないから、人も信用できないようになっているのです。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0095","summary":"私はもう少し先まで同じ道を辿って行きたかった。すると襖の陰で「あなた、あなた」という奥さんの声が二度聞こえた。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0096","summary":"「とにかくあまり私を信用してはいけませんよ。今に後悔するから。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0097","summary":"「かつてはその人の膝の前に跪いたという記憶が、今度はその人の頭の上に足を載せさせようとするのです。私は未来の侮辱を受けないために、今の尊敬を斥けたいと思うのです…","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0098","summary":"その後私は奥さんの顔を見るたびに気になった。先生は奥さんに対しても始終こういう態度に出るのだろうか。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0099","summary":"奥さんの様子は満足とも不満足とも極めようがなかった。私はそれほど近く奥さんに接触する機会がなかったから。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0100","summary":"私の疑惑はまだその上にもあった。先生の人間に対するこの覚悟はどこから来るのだろうか。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0101","summary":"これは私の胸で推測するがものはない。先生自身すでにそうだと告白していた。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0103","summary":"雑司ヶ谷にある誰だか分らない人の墓、――これも私の記憶に時々動いた。私はそれが先生と深い縁故のある墓だという事を知っていた。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0104","summary":"そうこうしているうちに、私はまた奥さんと差し向いで話をしなければならない時機が来た。その頃は日の詰って行くせわしない秋に、誰も注意を惹かれる肌寒の季節であった。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0105","summary":"私の行ったのはまだ灯の点くか点かない暮れ方であったが、几帳面な先生はもう宅にいなかった。「時間に後れると悪いって、つい今しがた出掛けました」といった奥さんは、私…","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0106","summary":"書斎には洋机と椅子の外に、沢山の書物が美しい背皮を並べて、硝子越に電燈の光で照らされていた。奥さんは火鉢の前に敷いた座蒲団の上へ私を坐らせて、「ちっとそこいらに…","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0107","summary":"三十分ほどすると、奥さんがまた書斎の入口へ顔を出した。「おや」といって、軽く驚いた時の眼を私に向けた。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0108","summary":"「じゃ失礼ですがもっと真中へ出て来て頂戴。ご退屈だろうと思って、お茶を入れて持って来たんですが、茶の間で宜しければあちらで上げますから」","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0109","summary":"私は奥さんの後に尾いて書斎を出た。茶の間には綺麗な長火鉢に鉄瓶が鳴っていた。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0110","summary":"「あなたは学問をする方だけあって、なかなかお上手ね。空っぽな理屈を使いこなす事が。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0112","summary":"私はまだその後にいうべき事をもっていた。けれども奥さんから徒らに議論を仕掛ける男のように取られては困ると思って遠慮した。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0113","summary":"妙なもので角砂糖をつまみ上げた奥さんは、私の顔を見て、茶碗の中へ入れる砂糖の数を聞いた。奥さんの態度は私に媚びるというほどではなかったけれども、先刻の強い言葉を…","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0114","summary":"「奥さん、先刻の続きをもう少しいわせて下さいませんか。奥さんには空な理屈と聞こえるかも知れませんが、私はそんな上の空でいってる事じゃないんだから」「じゃおっしゃ…","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0115","summary":"「そりゃ分らないわ、あなた。そんな事、先生に聞いて見るより外に仕方がないじゃありませんか。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"id":"kokoro-p0118","summary":"「そりゃ私から見れば分っています。（先生はそう思っていないかも知れませんが）。","strength":0.213,"R":1,"date":"2026-06-17","hof":false},{"i       badgeHof: '👑 Holds hall-of-fame link',
      badgeTheme: 'axis: theme',
      badgeNormal: 'Normal',
      nodeHof: '👑 Hall of Fame',
      edgePruned: 'pruned',
      matches: ' matches',
      bandTotal: 'total',
      axisNote: 'No axis column in the keywords table, so this is unused for this run (all keywords are treated as normal/hall-of-fame).',
      epHofTitle: 'Hall of fame (R>='
    }
  };
  var LANG = (navigator.language || '').toLowerCase().indexOf('ja') === 0 ? 'ja' : 'en';
  function t(key) {
    return (I18N[LANG] && I18N[LANG][key] != null) ? I18N[LANG][key] : key;
  }
  var STATIC_TEXT_MAP = {
    'title-text': 'title', 'stat-hof-label': 'statHof', 'legend-title': 'legendTitle',
    'legend-hof-text': 'legendHof', 'legend-theme-text': 'legendTheme', 'legend-normal-text': 'legendNormal',
    'hub-label-text': 'hubLabelToggle', 'footer-hint-text': 'footerHint',
    'panel-hint-text': 'panelHintPrefix', 'panel-episodes-title': 'panelEpisodesTitle'
  };

  // ---- ヘッダ統計を埋める (言語非依存の部分) ----
  document.getElementById('db-file-note').textContent = META.dbFile + ' / ' + META.generatedAt.slice(0, 19).replace('T', ' ') + ' UTC';
  document.getElementById('stat-episodes').textContent = META.counts.episodes;
  document.getElementById('stat-keywords').textContent = META.counts.keywordsNodes;
  document.getElementById('stat-links').textContent = META.counts.linksLive;
  document.getElementById('stat-hof').textContent = META.hallOfFameLinks;

  var bands = META.strengthBands;
  var bandTotal = Math.max(1, bands.total);
  document.getElementById('band-recall').style.width = (bands.recall / bandTotal * 100) + '%';
  document.getElementById('band-deep').style.width = (bands.deep / bandTotal * 100) + '%';
  document.getElementById('band-dig').style.width = (bands.dig / bandTotal * 100) + '%';

  function updateEdgeStat() {
    var edgeLabel = META.counts.edgesRendered;
    if (META.counts.edgesPruned > 0) {
      edgeLabel += ' (' + t('edgePruned') + ' ' + META.counts.edgesPruned + '/' + META.counts.edgesTotal + ')';
    }
    document.getElementById('stat-edges').textContent = edgeLabel;
  }

  function updateBandTitle() {
    document.getElementById('band-bar').title =
      'recall(>=0.5)=' + bands.recall + ' / deep(0.2-0.5)=' + bands.deep + ' / dig(<0.2)=' + bands.dig + ' / ' + t('bandTotal') + '=' + bands.total;
  }

  function updateAxisNote() {
    if (!META.hasAxisColumn) {
      var lp = document.getElementById('legend-purple');
      lp.style.opacity = '0.35';
      lp.title = t('axisNote');
    }
  }

  // ---- HTMLエスケープ ----
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  // ---- サイドパネル ----
  var sidePanel = document.getElementById('side-panel');
  var panelTitle = document.getElementById('panel-title');
  var panelBadges = document.getElementById('panel-badges');
  var panelEpisodes = document.getElementById('panel-episodes');

  function badgeHtml(node) {
    var out = '';
    out += '<span class="badge">' + t('badgeDegree') + ' ' + node.degree + '</span>';
    if (node.hof) out += '<span class="badge gold">' + t('badgeHof') + '</span>';
    if (node.axisTheme) out += '<span class="badge purple">' + t('badgeTheme') + '</span>';
    if (!node.hof && !node.axisTheme) out += '<span class="badge blue">' + t('badgeNormal') + '</span>';
    return out;
  }

  var currentPanelNode = null;

  function openPanel(node) {
    currentPanelNode = node;
    panelTitle.textContent = node.label;
    panelBadges.innerHTML = badgeHtml(node);
    if (!node.episodes.length) {
      panelEpisodes.innerHTML = '<div class="empty-note">' + escapeHtml(t('emptyNote')) + '</div>';
    } else {
      var html = '';
      node.episodes.forEach(function (ep) {
        html += '<div class="ep-row">';
        html += '<div class="ep-head">';
        html += '<span class="ep-strength">' + ep.strength.toFixed(3) + '</span>';
        if (ep.hof) html += '<span class="ep-hof" title="' + escapeHtml(t('epHofTitle') + META.nConsolidate + ')') + '">👑</span>';
        html += '<span class="ep-r">R=' + ep.R + '</span>';
        html += '<span class="ep-date">' + escapeHtml(ep.date || '-') + '</span>';
        html += '</div>';
        html += '<div class="ep-summary">' + escapeHtml(ep.summary) + '</div>';
        html += '<div class="ep-id">id: ' + escapeHtml(ep.id) + '</div>';
        html += '</div>';
      });
      panelEpisodes.innerHTML = html;
    }
    sidePanel.classList.add('open');
  }

  function closePanel() {
    currentPanelNode = null;
    sidePanel.classList.remove('open');
  }
  document.getElementById('panel-close').addEventListener('click', closePanel);

  // ---- グラフ本体 ----
  var elGraph = document.getElementById('graph');
  var highlightSet = new Set();

  var weights = EDGES.length ? EDGES.map(function (e) { return e.weight; }) : [0, 1];
  var minW = Math.min.apply(null, weights);
  var maxW = Math.max.apply(null, weights);
  function normW(w) {
    return maxW > minW ? (w - minW) / (maxW - minW) : 0.5;
  }
  function widthScale(w) {
    return 0.4 + normW(w) * 2.6;
  }
  var EDGE_COLD = [42, 59, 77];   // 弱いリンク: くすんだ紺
  var EDGE_HOT = [126, 232, 255]; // 強いリンク: 明るいシアン
  function colorScale(w) {
    var t = normW(w);
    var r = Math.round(EDGE_COLD[0] + (EDGE_HOT[0] - EDGE_COLD[0]) * t);
    var g = Math.round(EDGE_COLD[1] + (EDGE_HOT[1] - EDGE_COLD[1]) * t);
    var b = Math.round(EDGE_COLD[2] + (EDGE_HOT[2] - EDGE_COLD[2]) * t);
    return 'rgb(' + r + ',' + g + ',' + b + ')';
  }

  var Graph = ForceGraph3D()(elGraph)
    .graphData({ nodes: NODES, links: EDGES })
    .backgroundColor('#05070a')
    .showNavInfo(false)
    .nodeLabel(function (n) {
      return escapeHtml(n.label) + ' (' + t('badgeDegree') + ' ' + n.degree + ')' + (n.hof ? ' ' + t('nodeHof') : '');
    })
    .nodeColor(function (n) { return highlightSet.has(n.id) ? '#ffffff' : n.color; })
    .nodeVal(function (n) { return n.val; })
    .nodeRelSize(3)
    .nodeResolution(8)
    .nodeOpacity(0.92)
    .linkWidth(function (l) { return widthScale(l.weight); })
    .linkColor(function (l) { return colorScale(l.weight); })
    .linkOpacity(0.45)
    .linkCurvature(0.15)
    .linkDirectionalParticles(function (l) {
      var s = typeof l.source === 'object' ? l.source : null;
      var t = typeof l.target === 'object' ? l.target : null;
      var srcHof = s ? s.hof : false;
      var tgtHof = t ? t.hof : false;
      return (srcHof || tgtHof) ? 2 : 0;
    })
    .linkDirectionalParticleWidth(1.6)
    .linkDirectionalParticleSpeed(0.004)
    .linkDirectionalParticleColor(function () { return '#ffe9a8'; })
    .onNodeClick(function (n) { openPanel(n); })
    .onBackgroundClick(function () { closePanel(); })
    .onNodeHover(function (n) { elGraph.style.cursor = n ? 'pointer' : 'default'; });

  function resize() {
    Graph.width(elGraph.clientWidth).height(elGraph.clientHeight);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---- 検索 + カメラフォーカス ----
  var searchBox = document.getElementById('search-box');
  var searchResult = document.getElementById('search-result');

  function focusNode(node) {
    var x = node.x || 0.01, y = node.y || 0.01, z = node.z || 0.01;
    var distance = 90;
    var distRatio = 1 + distance / Math.hypot(x, y, z);
    Graph.cameraPosition(
      { x: x * distRatio, y: y * distRatio, z: z * distRatio },
      node,
      1200
    );
  }

  function runSearch() {
    var q = searchBox.value.trim().toLowerCase();
    if (!q) {
      highlightSet = new Set();
      searchResult.textContent = '';
      Graph.refresh();
      return null;
    }
    var matches = NODES.filter(function (n) { return n.label.toLowerCase().indexOf(q) !== -1; });
    highlightSet = new Set(matches.map(function (n) { return n.id; }));
    searchResult.textContent = matches.length + t('matches');
    Graph.refresh();
    return matches;
  }
  searchBox.addEventListener('input', function () {
    var matches = runSearch();
    if (matches && matches.length) {
      matches.sort(function (a, b) { return b.degree - a.degree; });
      focusNode(matches[0]);
    }
  });

  // ---- ハブキーワードの常時ラベル (DOMオーバーレイ + 手動スクリーン投影) ----
  // 3d-force-graphはノードラベルをホバー時のみ表示する。「一定次数以上は常時表示」の
  // ためにthree-spritetext等の追加CDNは使わず、camera.matrixWorldInverse /
  // projectionMatrix から手計算でスクリーン座標に投影したDOM要素を重ねている
  // (追加のCDN依存を増やさないための実装選択)。
  var labelLayer = document.getElementById('label-layer');
  var hubThreshold = META.labelAlwaysDegree;
  var hubNodes = NODES.filter(function (n) { return n.degree >= hubThreshold; });
  var hubEls = new Map();
  hubNodes.forEach(function (n) {
    var div = document.createElement('div');
    div.className = 'hub-label';
    div.textContent = n.label;
    labelLayer.appendChild(div);
    hubEls.set(n.id, div);
  });

  var labelsEnabled = true;
  document.getElementById('hub-label-checkbox').addEventListener('change', function (e) {
    labelsEnabled = e.target.checked;
    if (!labelsEnabled) {
      hubEls.forEach(function (div) { div.style.display = 'none'; });
    }
  });

  function projectToScreen(camera, x, y, z, width, height) {
    var ev = camera.matrixWorldInverse.elements;
    var ep = camera.projectionMatrix.elements;
    var vx = ev[0] * x + ev[4] * y + ev[8] * z + ev[12];
    var vy = ev[1] * x + ev[5] * y + ev[9] * z + ev[13];
    var vz = ev[2] * x + ev[6] * y + ev[10] * z + ev[14];
    var vw = ev[3] * x + ev[7] * y + ev[11] * z + ev[15];
    var cx = ep[0] * vx + ep[4] * vy + ep[8] * vz + ep[12] * vw;
    var cy = ep[1] * vx + ep[5] * vy + ep[9] * vz + ep[13] * vw;
    var cw = ep[3] * vx + ep[7] * vy + ep[11] * vz + ep[15] * vw;
    if (cw <= 0.001) return null;
    var ndcX = cx / cw, ndcY = cy / cw;
    return {
      x: (ndcX * 0.5 + 0.5) * width,
      y: (1 - (ndcY * 0.5 + 0.5)) * height
    };
  }

  function updateHubLabels() {
    if (labelsEnabled && hubNodes.length) {
      var width = elGraph.clientWidth, height = elGraph.clientHeight;
      var camera = Graph.camera();
      hubNodes.forEach(function (n) {
        var div = hubEls.get(n.id);
        if (n.x === undefined || n.y === undefined || n.z === undefined) {
          div.style.display = 'none';
          return;
        }
        var p = projectToScreen(camera, n.x, n.y, n.z, width, height);
        if (!p || p.x < -80 || p.x > width + 80 || p.y < -40 || p.y > height + 40) {
          div.style.display = 'none';
        } else {
          div.style.display = 'block';
          div.style.left = p.x.toFixed(1) + 'px';
          div.style.top = p.y.toFixed(1) + 'px';
        }
      });
    }
    requestAnimationFrame(updateHubLabels);
  }
  requestAnimationFrame(updateHubLabels);

  // ---- 言語切り替え (JA/EN) ----
  function applyStaticText() {
    Object.keys(STATIC_TEXT_MAP).forEach(function (id) {
      var el = document.getElementById(id);
      if (el) el.textContent = t(STATIC_TEXT_MAP[id]);
    });
    document.title = t('pageTitle');
    document.documentElement.lang = LANG;
    searchBox.placeholder = t('searchPlaceholder');
    document.getElementById('panel-close').title = t('panelClose');
  }

  function setLang(lang) {
    LANG = I18N[lang] ? lang : 'en';
    document.getElementById('lang-btn-ja').classList.toggle('active', LANG === 'ja');
    document.getElementById('lang-btn-en').classList.toggle('active', LANG === 'en');
    applyStaticText();
    updateEdgeStat();
    updateBandTitle();
    updateAxisNote();
    runSearch();
    if (currentPanelNode) openPanel(currentPanelNode);
  }

  document.getElementById('lang-btn-ja').addEventListener('click', function () { setLang('ja'); });
  document.getElementById('lang-btn-en').addEventListener('click', function () { setLang('en'); });
  setLang(LANG);

  if (window.innerWidth < 700) {
    document.getElementById('legend-wrap').classList.add('collapsed');
  }
})();
</script>
</body>
</html>
